<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" width="1080" height="400">
  <title>SKYLINE AI — Brand Lockup</title>
  <desc>Full brand lockup: logo medallion + wordmark side by side</desc>

  <defs>
    <style>
      .ring    { fill: none; stroke: #111; stroke-width: 2.5; stroke-linecap: square; stroke-linejoin: miter; stroke-miterlimit: 6; }
      .ring-th { fill: none; stroke: #111; stroke-width: 1;   stroke-linecap: square; stroke-linejoin: miter; stroke-miterlimit: 4; }
      .tick    { fill: none; stroke: #111; stroke-width: 1.5; stroke-linecap: square; stroke-linejoin: miter; stroke-miterlimit: 4; }
      .horizon { fill: none; stroke: #111; stroke-width: 1.5; stroke-linecap: square; }
      .city    { fill: none; stroke: #111; stroke-width: 3.5; stroke-linecap: square; stroke-linejoin: miter; stroke-miterlimit: 6; }
      .solid   { fill: #111; }
      .wm      { fill: none; stroke: #111; stroke-width: 8; stroke-linecap: square; stroke-linejoin: miter; stroke-miterlimit: 6; }
    </style>
  </defs>

  <!-- ===== LOGO MEDALLION (left side, x=20-380, y=20-380) ===== -->
  <g transform="translate(20, 20) scale(0.9)">
    <circle cx="200" cy="200" r="180" class="ring"/>
    <g class="solid">
      <path d="M 380 194 L 386 200 L 380 206 L 374 200 Z"/>
      <path d="M 327.28 66.72 L 333.28 72.72 L 327.28 78.72 L 321.28 72.72 Z"/>
      <path d="M 200 14 L 206 20 L 200 26 L 194 20 Z"/>
      <path d="M 72.72 66.72 L 78.72 72.72 L 72.72 80.72 L 66.72 72.72 Z"/>
      <path d="M 20 194 L 26 200 L 20 206 L 14 200 Z"/>
      <path d="M 72.72 333.28 L 78.72 327.28 L 72.72 321.28 L 66.72 327.28 Z"/>
      <path d="M 200 386 L 206 380 L 200 374 L 194 380 Z"/>
      <path d="M 333.28 333.28 L 327.28 327.28 L 333.28 321.28 L 339.28 327.28 Z"/>
      <circle cx="380" cy="200" r="1.8"/>
      <circle cx="327.28" cy="72.72" r="1.8"/>
      <circle cx="200" cy="20" r="1.8"/>
      <circle cx="72.72" cy="72.72" r="1.8"/>
      <circle cx="20" cy="200" r="1.8"/>
      <circle cx="72.72" cy="327.28" r="1.8"/>
      <circle cx="200" cy="380" r="1.8"/>
      <circle cx="327.28" cy="327.28" r="1.8"/>
    </g>
    <g class="tick">
      <line x1="360" y1="200" x2="372" y2="200"/>
      <line x1="313.14" y1="86.86" x2="321.62" y2="78.38"/>
      <line x1="200" y1="34" x2="200" y2="40"/>
      <line x1="86.86" y1="86.86" x2="78.38" y2="78.38"/>
      <line x1="40" y1="200" x2="28" y2="200"/>
      <line x1="86.86" y1="313.14" x2="78.38" y2="321.62"/>
      <line x1="200" y1="360" x2="200" y2="372"/>
      <line x1="313.14" y1="313.14" x2="321.62" y2="321.62"/>
    </g>
    <circle cx="200" cy="200" r="160" class="ring-th"/>
    <line x1="80" y1="300" x2="320" y2="300" class="horizon"/>
    <g class="city">
      <path d="M 91 300 L 91 268 L 126 268 L 126 300"/>
      <path d="M 130 300 L 130 248 L 152 248 L 152 228 L 160 228 L 160 300"/>
      <path d="M 164 300 L 164 210 L 173 210 L 173 188 L 180 188 L 180 168 L 184 168 L 184 300"/>
      <path d="M 188 300 L 200 44 L 212 300 Z"/>
      <path d="M 184 300 L 190 280 L 210 280 L 216 300"/>
      <path d="M 216 300 L 216 168 L 220 168 L 220 188 L 227 188 L 227 210 L 236 210 L 236 300"/>
      <path d="M 240 300 L 240 228 L 248 228 L 248 248 L 270 248 L 270 300"/>
      <path d="M 274 300 L 274 268 L 309 268 L 309 300"/>
    </g>
    <path class="solid" d="M 200 177 L 203 180 L 200 183 L 197 180 Z"/>
    <path class="solid" d="M 200 212 L 203 215 L 200 218 L 197 215 Z"/>
    <path class="solid" d="M 200 47 L 203 50 L 200 53 L 197 50 Z"/>
    <g class="solid">
      <path d="M 120 124 L 127 119 L 132 112 L 137 119 L 144 124 L 137 129 L 132 136 L 127 129 Z"/>
      <path d="M 260 120 L 266 116 L 270 110 L 274 116 L 280 120 L 274 124 L 270 130 L 266 124 Z"/>
      <path d="M 104 226 L 107 223 L 110 220 L 113 223 L 116 226 L 113 229 L 110 232 L 107 229 Z"/>
      <path d="M 284 240 L 287 237 L 290 234 L 293 237 L 296 240 L 293 243 L 290 246 L 287 243 Z"/>
    </g>
  </g>

  <!-- ===== DIVIDER (subtle vertical line between logo and wordmark) ===== -->
  <line x1="408" y1="120" x2="408" y2="280" stroke="#111" stroke-width="1" stroke-dasharray="2 4" opacity="0.4"/>

  <!-- ===== WORDMARK (right side, x=440-1060) ===== -->
  <g class="wm" transform="translate(440, 130)">
    <!-- SKYLINE (cap height 80, x baseline 0 to 474) -->
    <path d="M 50 10 L 10 10 L 10 50 L 50 50 L 50 90 L 10 90"/>
    <path transform="translate(74, 0)" d="M 10 10 L 10 90 M 10 50 L 50 10 M 10 50 L 50 90"/>
    <path transform="translate(148, 0)" d="M 10 10 L 30 50 M 50 10 L 30 50 M 30 50 L 30 90"/>
    <path transform="translate(222, 0)" d="M 10 10 L 10 90 L 50 90"/>
    <path transform="translate(296, 0)" d="M 15 10 L 15 90 M 5 10 L 25 10 M 5 90 L 25 90"/>
    <path transform="translate(340, 0)" d="M 10 10 L 10 90 M 10 10 L 50 90 M 50 10 L 50 90"/>
    <path transform="translate(414, 0)" d="M 10 10 L 10 90 M 10 10 L 50 10 M 10 50 L 40 50 M 10 90 L 50 90"/>
    <!-- AI (word gap 42) -->
    <path transform="translate(516, 0)" d="M 10 90 L 30 10 L 50 90 M 18 60 L 42 60"/>
    <path transform="translate(590, 0)" d="M 15 10 L 15 90 M 5 10 L 25 10 M 5 90 L 25 90"/>
  </g>

  <!-- ===== TAGLINE (below wordmark, small caps tracking) ===== -->
  <g transform="translate(440, 270)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#111" stroke-width="1.5"/>
    <text x="56" y="4" font-family="ui-monospace, Menlo, monospace" font-size="11" letter-spacing="3" fill="#111">CIVIC INTELLIGENCE / EST. 2026</text>
  </g>
</svg>